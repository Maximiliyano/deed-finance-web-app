services:
  deed.api:
    image: ${DOCKER_REGISTRY-}deedapi
    build:
      context: .
      dockerfile: Deed.Api/Dockerfile
    depends_on:
      deed.db:
        condition: service_healthy
    ports:
      - "8000:8000"
      - "8001:8001"

  deed.db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    user: "0:0"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Passw0rd."
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Passw0rd.' -C -Q 'SELECT 1' -b 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mssql-data:/var/opt/mssql/data
    ports:
      - "8002:1433"

volumes:
  mssql-data:
