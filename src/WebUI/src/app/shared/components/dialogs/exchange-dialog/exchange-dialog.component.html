<div class="exchange-header">
  <i class="fas fa-money-bill-wave"></i>
  Exchange Rates
</div>

<div class="exchange-dialog">
  <table class="table">
    <thead>
      <tr>
        <th>Currency</th>
        <th>Buy</th>
        <th>National</th>
        <th>Sale</th>
      </tr>
    </thead>
    <tbody>
      @for (exchange of exchanges; track exchange.sale) {
        <tr>
          <td class="font-medium">{{ exchange?.targetCurrency ?? '—' }}</td>
          <td>{{ exchange?.buy | number: '1.2-2' }}</td>
          <td class="text-muted">{{ exchange?.nationalCurrency ?? '—' }}</td>
          <td class="text-muted">{{ exchange?.sale | number: '1.2-2' }}</td>
        </tr>
      }
      @empty {
        <tr>
          <td colspan="4" class="exchange-empty">Nothing there.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
