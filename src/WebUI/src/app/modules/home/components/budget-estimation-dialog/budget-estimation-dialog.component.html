<form [formGroup]="form" (ngSubmit)="submit()" class="est-dialog">
  <div class="est-header">
    <i class="fas fa-list-check"></i>
    {{ isEdit ? 'Edit Estimation' : 'Add Estimation' }}
  </div>

  <div class="est-body">
    <div class="form-group">
      <label class="form-label">Description</label>
      <input type="text" class="input" formControlName="description" placeholder="e.g. Rent, Groceries…" autocomplete="off">
    </div>

    <div class="est-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">Budget Amount</label>
        <input type="number" class="input" formControlName="budgetAmount" min="0" step="0.01" autocomplete="off">
      </div>
      <div class="form-group" style="min-width:100px">
        <label class="form-label">Currency</label>
        <select class="input" formControlName="budgetCurrency">
          @for (c of currencies; track c) {
            <option [value]="c">{{ c }}</option>
          }
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Capital (optional)</label>
      <select class="input" formControlName="capitalId">
        <option value="">— None —</option>
        @for (cap of capitals; track cap.id) {
          <option [value]="cap.id">{{ cap.name }} ({{ cap.currency }})</option>
        }
      </select>
    </div>

    @if (selectedCapital) {
      <div class="est-summary">
        <div class="est-summary-row">
          <span class="est-summary-label">Total Spent</span>
          <span class="est-summary-val text-danger">{{ totalSpent | number:'1.2-2' }} {{ selectedCapital.currency }}</span>
        </div>
        <div class="est-summary-row">
          <span class="est-summary-label">Remains</span>
          <span class="est-summary-val" [class.text-success]="remains >= 0" [class.text-danger]="remains < 0">
            {{ remains | number:'1.2-2' }} {{ form.get('budgetCurrency')?.value }}
          </span>
        </div>
      </div>
    }
  </div>

  <div class="est-footer">
    <button type="button" class="btn btn-secondary btn-sm" (click)="cancel()">Cancel</button>
    <button type="submit" class="btn btn-primary btn-sm" [disabled]="form.invalid">
      {{ isEdit ? 'Save' : 'Add' }}
    </button>
  </div>
</form>
