<form [formGroup]="form" (ngSubmit)="submit()" class="salary-dialog">
  <div class="salary-header">
    <i class="fas fa-wallet"></i>
    Monthly Salary
  </div>

  <div class="salary-body">
    <div class="salary-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">Amount</label>
        <input type="number" class="input" formControlName="salary" min="0" step="0.01" autocomplete="off">
      </div>
      <div class="form-group" style="min-width:100px">
        <label class="form-label">Currency</label>
        <select class="input" formControlName="currency">
          @for (c of currencies; track c) {
            <option [value]="c">{{ c }}</option>
          }
        </select>
      </div>
    </div>
  </div>

  <div class="salary-footer">
    <button type="button" class="btn btn-secondary btn-sm" (click)="cancel()">Cancel</button>
    <button type="submit" class="btn btn-primary btn-sm" [disabled]="form.invalid">Save</button>
  </div>
</form>
