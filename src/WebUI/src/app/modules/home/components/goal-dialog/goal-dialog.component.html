<form [formGroup]="form" (ngSubmit)="submit()" class="goal-dialog">
  <div class="goal-header">
    <i class="fas fa-star"></i>
    {{ isEdit ? 'Edit Goal' : 'Add Goal' }}
  </div>

  <div class="goal-body">
    <div class="form-group">
      <label class="form-label">Title</label>
      <input type="text" class="input" formControlName="title" placeholder="e.g. Emergency Fund, New Car…" autocomplete="off">
    </div>

    <div class="goal-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">Target Amount</label>
        <input type="number" class="input" formControlName="targetAmount" min="0.01" step="0.01" autocomplete="off">
      </div>
      <div class="form-group" style="min-width:100px">
        <label class="form-label">Currency</label>
        <select class="input" formControlName="currency">
          @for (c of currencies; track c) {
            <option [value]="c">{{ c }}</option>
          }
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Current Amount</label>
      <input type="number" class="input" formControlName="currentAmount" min="0" step="0.01" autocomplete="off">
    </div>

    <div class="goal-progress-wrap">
      <div class="goal-progress-bar">
        <div class="goal-progress-fill" [style.width.%]="progress"
             [ngClass]="progress >= 100 ? 'fill-success' : 'fill-primary'"></div>
      </div>
      <span class="goal-progress-pct">{{ progress }}%</span>
    </div>

    <div class="goal-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">Deadline (optional)</label>
        <input type="date" class="input" formControlName="deadline">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Note (optional)</label>
      <textarea class="input textarea" formControlName="note" placeholder="Any notes…"></textarea>
    </div>

    @if (isEdit) {
      <label class="checkbox-row">
        <input type="checkbox" formControlName="isCompleted" class="checkbox">
        <span class="checkbox-label">Mark as completed</span>
      </label>
    }
  </div>

  <div class="goal-footer">
    <button type="button" class="btn btn-secondary btn-sm" (click)="cancel()">Cancel</button>
    <button type="submit" class="btn btn-primary btn-sm" [disabled]="form.invalid || (isEdit && form.pristine)">
      {{ isEdit ? 'Save' : 'Add Goal' }}
    </button>
  </div>
</form>
