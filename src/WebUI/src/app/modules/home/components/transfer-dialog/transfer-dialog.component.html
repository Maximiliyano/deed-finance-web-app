<form [formGroup]="form" (ngSubmit)="submit()" class="tf-dialog">
  <div class="tf-header">
    <i class="fas fa-exchange-alt"></i>
    Transfer Between Capitals
  </div>

  <div class="tf-body">
    <div class="form-group">
      <label class="form-label">From</label>
      <select class="input" formControlName="sourceCapitalId">
        <option [ngValue]="null" disabled>Select source…</option>
        @for (cap of capitals; track cap.id) {
          <option [ngValue]="cap.id">{{ cap.name }} — {{ cap.balance | number:'1.2-2' }} {{ cap.currency }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Send ({{ selectedSource?.currency ?? '...' }})</label>
      <input type="number" class="input" formControlName="amount" min="0.01" step="0.01" placeholder="0.00" autocomplete="off">
      @if (selectedSource) {
        <span class="tf-hint">Available: {{ selectedSource.balance | number:'1.2-2' }} {{ selectedSource.currency }}</span>
      }
    </div>

    <div class="tf-arrow">
      <i class="fas fa-arrow-down"></i>
    </div>

    <div class="form-group">
      <label class="form-label">To</label>
      <select class="input" formControlName="destinationCapitalId">
        <option [ngValue]="null" disabled>Select destination…</option>
        @for (cap of capitals; track cap.id) {
          <option [ngValue]="cap.id">{{ cap.name }} — {{ cap.balance | number:'1.2-2' }} {{ cap.currency }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Receive ({{ selectedDest?.currency ?? '...' }})</label>
      <input type="number" class="input" formControlName="destinationAmount" min="0.01" step="0.01" placeholder="0.00" autocomplete="off">
      @if (isCrossCurrency) {
        <span class="tf-hint">Auto-calculated from exchange rate — edit if needed</span>
      }
    </div>
  </div>

  <div class="tf-footer">
    <button type="button" class="btn btn-secondary btn-sm" (click)="cancel()">Cancel</button>
    <button type="submit" class="btn btn-primary btn-sm" [disabled]="form.invalid">Transfer</button>
  </div>
</form>
